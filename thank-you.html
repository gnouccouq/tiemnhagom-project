<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cảm ơn bạn - Tiệm Nhà Gốm</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>
    <div id="toast-container" class="toast-container"></div>

    <main class="cart-container reveal-on-scroll is-visible">
        <div class="checkout-section" style="text-align: center; padding: 5rem 2rem;">
            <div style="font-size: 5rem; color: #27ae60; margin-bottom: 1.5rem; line-height: 1;">✓</div>
            <h1 class="page-title" style="margin-bottom: 1rem; border: none;">Cảm ơn bạn đã đặt hàng!</h1>
            <p style="color: #666; margin-bottom: 2rem; font-size: 1.1rem;">
                Mã đơn hàng của bạn là: <strong id="order-id-display" style="color: var(--text-black);">...</strong>
            </p>
            <p style="max-width: 600px; margin: 0 auto 3.5rem; line-height: 1.8; color: #555;">
                Chúng tôi đã nhận được đơn hàng của bạn và đang tiến hành xử lý. 
                Đội ngũ Tiệm Nhà Gốm sẽ sớm liên hệ với bạn qua số điện thoại đã cung cấp để xác nhận.
            </p>
            <div class="cart-actions" style="justify-content: center; gap: 1rem;">
                <a href="../" class="btn-dark" style="margin: 0; padding: 1rem 2rem;">Tiếp tục mua sắm</a>
                <a href="../profile/#orders" id="view-orders-btn" class="btn-outline" style="margin: 0; padding: 1rem 2rem; display: none;">Xem đơn hàng</a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../js/thank-you.js" type="module"></script>
</body>
</html>
