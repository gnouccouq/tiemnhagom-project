<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tất cả sản phẩm - Tiệm Nhà Gốm</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../Asset/icons/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="products-page">
    <div id="header-placeholder"></div>

    <!-- Banner đầu trang full chiều ngang -->
    <section class="product-banner">
        <div class="banner-content">
            <h1>Cửa Hàng</h1>
            <p>Khám phá vẻ đẹp mộc mạc của gốm thủ công</p>
        </div>
    </section>

    <main class="products-page-container">
        <!-- Phần danh mục sản phẩm ô vuông -->
        <section class="category-grid-section">
            <div id="category-grid-display" class="category-square-grid">
                <!-- Danh mục render từ JS -->
            </div>
        </section>

        <div class="products-content">
            <section class="product-listing">
                <div class="listing-toolbar">
                    <div class="toolbar-left">
                        <input type="text" id="search-name" placeholder="Tìm kiếm sản phẩm..." class="search-input">
                    </div>
                    <div class="toolbar-right">
                        <button id="mobile-filter-btn" class="btn-minimal mobile-filter-trigger">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                            </svg>
                            <span>Bộ lọc</span>
                        </button>

                        <div class="sort-options">
                            <label for="sort-by">Sắp xếp:</label>
                            <select id="sort-by">
                                <option value="newest">Mới nhất</option>
                                <option value="popular">Bán chạy nhất</option>
                                <option value="name-asc">Tên: A-Z</option>
                                <option value="name-desc">Tên: Z-A</option>
                                <option value="price-asc">Giá: Thấp đến Cao</option>
                                <option value="price-desc">Giá: Cao đến Thấp</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="all-product-grid" class="grid">
                    <!-- Sản phẩm sẽ được render từ Firebase ở đây -->
                    <div style="text-align: center; grid-column: 1/-1; padding: 5rem;">
                        <div class="spinner"></div>
                        <p style="margin-top: 1rem; color: #888;">Đang tải sản phẩm...</p>
                    </div>
                </div>

                <div class="pagination-container">
                    <button id="prev-page" class="btn-minimal" disabled>Trang trước</button>
                    <span id="page-info">Trang 1</span>
                    <button id="next-page" class="btn-minimal">Trang sau</button>
                </div>

                <div id="no-products-found" style="display: none; text-align: center; padding: 5rem;">
                    <p>Không tìm thấy sản phẩm nào phù hợp.</p>
                </div>
            </section>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="../js/products.js"></script>
</body>
