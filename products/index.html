    <!-- Speculation Rules API -->
    <script type="speculationrules">
    {
      "prerender": [{
        "source": "document",
        "where": {
          "and": [
            { "href_matches": "/*" },
            { "not": { "href_matches": [
              "/admin/*",
              "/cart/*",
              "/login/*",
              "/profile/*"
            ]}}
          ]
        },
        "eagerness": "moderate"
      }]
    }
    </script>
    <style>
        #col-hero {
            background-attachment: scroll;
            background-position: center;
            background-size: cover;
            width: 100%;
            height: 30vh; /* Chiều cao vừa phải cho trang danh sách sản phẩm */
            min-height: 300px;
            margin-top: -80px;
            margin-bottom: 2rem; /* Giảm khoảng trắng dưới banner */
        }

        /* Minimal category list styles */
        .minimal-category-list {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            flex-wrap: wrap;
            margin-bottom: 0; /* Xóa margin cũ */
        }
        
        .category-grid-section {
            margin-bottom: 2rem; /* Giảm khoảng trắng dưới danh mục */
        }
        .minimal-cat-item {
            color: #333;
            text-decoration: none;
            font-size: 1rem;
            text-transform: lowercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }
        .minimal-cat-item.active {
            font-weight: 700;
        }
        .minimal-cat-item:hover {
            color: #000;
            opacity: 0.7;
        }

        /* Group search and sort together on the left */
        @media (min-width: 769px) {
            .listing-toolbar {
                justify-content: flex-start !important;
                gap: 2rem;
                border-bottom: none !important;
            }
            .toolbar-right {
                display: flex;
                align-items: center;
                gap: 1.5rem;
            }
            .sort-options {
                margin-bottom: 0 !important; /* Align height with search box */
            }
            .toolbar-left .search-input {
                min-width: 250px !important;
            }
        }
    </style>
</head>
<body class="home-page products-page">
    <div id="header-placeholder"></div>

    <main>
        <!-- Banner đầu trang full chiều ngang, phong cách tối giản -->
        <section id="col-hero" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1610701596007-11502861dcfa?q=80&w=1600'); display: flex; align-items: center; justify-content: center; position: relative;">
            <h1 id="hero-banner-title" style="color: #fff; font-size: 1.4rem; font-weight: 600; letter-spacing: 1px; text-transform: lowercase; z-index: 10;">sản phẩm</h1>
        </section>

        <div class="products-page-container" style="padding-top: 0;">
        <!-- Phần danh mục sản phẩm ô vuông -->
        <section class="category-grid-section">
            <div id="category-grid-display" class="category-square-grid">
                <!-- Danh mục render từ JS -->
            </div>
        </section>

        <div class="products-content">
            <section class="product-listing">
                <div class="listing-toolbar">
                    <div class="toolbar-left">
                        <input type="text" id="search-name" placeholder="Tìm kiếm sản phẩm..." class="search-input">
                    </div>
                    <div class="toolbar-right">
                        <div class="sort-options">
                            <label for="sort-by">Sắp xếp:</label>
                            <select id="sort-by">
                                <option value="newest">Mới nhất</option>
                                <option value="popular">Bán chạy nhất</option>
                                <option value="name-asc">Tên: A-Z</option>
                                <option value="name-desc">Tên: Z-A</option>
                                <option value="price-asc">Giá: Thấp đến Cao</option>
                                <option value="price-desc">Giá: Cao đến Thấp</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="all-product-grid" class="grid">
                    <!-- Sản phẩm sẽ được render từ Firebase ở đây -->
                    <div style="text-align: center; grid-column: 1/-1; padding: 5rem;">
                        <div class="spinner"></div>
                        <p style="margin-top: 1rem; color: #888;">Đang tải sản phẩm...</p>
                    </div>
                </div>

                <div class="pagination-container" style="justify-content: center;">
                    <button id="load-more-btn" class="btn-dark" style="display: none; padding: 10px 30px;">Xem thêm sản phẩm</button>
                </div>

                <div id="no-products-found" style="display: none; text-align: center; padding: 5rem;">
                    <p>Không tìm thấy sản phẩm nào phù hợp.</p>
                </div>
            </section>
        </div>
