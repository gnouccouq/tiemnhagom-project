<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bộ sưu tập | Tiệm Nhà Gốm</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../Asset/icons/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        #col-hero { 
            background-attachment: fixed; 
            background-position: center; 
            background-size: cover;
            transition: background-image 0.5s ease-in-out;
        }
        .collection-story { max-width: 900px; margin: 5rem auto; text-align: center; padding: 0 20px; }
        .collection-story h2 { font-size: 2.8rem; margin-bottom: 2rem; color: var(--text-black); }
        .collection-story p { font-size: 1.15rem; line-height: 1.8; color: #555; white-space: pre-line; font-family: var(--font-serif); }
        
        .collection-gallery-masonry { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin: 4rem 0 6rem; }
        .gallery-item { border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); aspect-ratio: 1 / 1; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: zoom-in; }
        .gallery-item img:hover { transform: scale(1.05); }
        
        @media (max-width: 992px) { .collection-gallery-masonry { grid-template-columns: repeat(2, 1fr); } .collection-story h2 { font-size: 2rem; } }
        @media (max-width: 600px) { .collection-gallery-masonry { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main id="collection-detail-page" style="display: none;">
        <!-- Hero Banner -->
        <section id="col-hero" class="product-banner" style="height: 60vh; min-height: 400px;">
            <div class="banner-content">
                <h1 id="col-title">Tên Bộ Sưu Tập</h1>
                <p id="col-subtitle">Tiệm Nhà Gốm - Ceramics & Decor</p>
            </div>
        </section>

        <!-- Câu chuyện -->
        <section class="collection-story reveal-on-scroll">
            <h2 id="story-heading">Cảm hứng từ đất</h2>
            <p id="col-description">Đang tải câu chuyện...</p>
        </section>

        <!-- Gallery ảnh nghệ thuật -->
        <section class="collection-gallery-section" style="padding: 0 5%;">
            <div id="col-gallery" class="collection-gallery-masonry">
                <!-- JS render ảnh -->
            </div>
        </section>

        <!-- Danh sách sản phẩm -->
        <section class="featured-products" style="background: #fff; padding: 6rem 5%;">
            <div class="section-header">
                <h2>Các tác phẩm trong bộ sưu tập</h2>
                <p class="section-subtitle">Những mẫu gốm được tuyển chọn kỹ lưỡng</p>
            </div>
            <div id="col-product-grid" class="grid">
                <!-- JS render sản phẩm -->
                <div style="text-align:center; padding: 5rem; grid-column: 1/-1;"><span class="spinner"></span></div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module">
        import { db, initHeader, renderProductCard } from "../js/utils.js";
        import { doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', async () => {
            initHeader('../');
            const urlParams = new URLSearchParams(window.location.search);
            const colName = urlParams.get('name');

            if (!colName) { window.location.href = './'; return; }

            try {
                // 1. Lấy thông tin bộ sưu tập (mô tả, gallery)
                const colSnap = await getDoc(doc(db, "settings", "collections"));
                const collectionData = colSnap.exists() ? colSnap.data().items.find(c => c.name === colName) : null;

                if (collectionData) {
                    document.getElementById('col-title').innerText = collectionData.name;
                    document.getElementById('col-description').innerText = collectionData.description || "Từng món gốm trong bộ sưu tập này mang trong mình hơi thở của đất và lửa, được tạo tác thủ công với tất cả sự tỉ mỉ.";
                    document.getElementById('col-hero').style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${collectionData.imageUrl}')`;
                    
                    // Render Gallery
                    const galleryContainer = document.getElementById('col-gallery');
                    if (collectionData.galleryUrls && collectionData.galleryUrls.length > 0) {
                        galleryContainer.innerHTML = collectionData.galleryUrls.map(url => `
                            <div class="gallery-item reveal-on-scroll">
                                <img src="${url}" onclick="window.openFullScreen(this.src)" loading="lazy">
                            </div>
                        `).join('');
                    }

                    // 2. Lấy danh sách sản phẩm thuộc bộ sưu tập này
                    const q = query(collection(db, "products"), where("collections", "array-contains", colName));
                    const pSnap = await getDocs(q);
                    const grid = document.getElementById('col-product-grid');
                    
                    let productsHtml = '';
                    pSnap.forEach(doc => productsHtml += renderProductCard(doc.data(), doc.id, [], '../product/index.html'));
                    grid.innerHTML = productsHtml || '<p style="grid-column:1/-1; text-align:center;">Chưa có sản phẩm nào trong bộ sưu tập này.</p>';

                    document.getElementById('collection-detail-page').style.display = 'block';
                    document.querySelectorAll('.reveal-on-scroll').forEach(el => window.revealObserver?.observe(el));
                }
            } catch (e) {
                console.error(e);
                showToast("Lỗi tải dữ liệu", "error");
            }
        });
    </script>
</body>
</html>
