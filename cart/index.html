<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Tiệm Nhà Gốm</title>
    <meta name="description" content="Xem giỏ hàng của bạn tại Tiệm Nhà Gốm. Quản lý sản phẩm đã chọn, áp dụng mã ưu đãi và tiến hành thanh toán nhanh chóng để sở hữu những món đồ gốm thủ công tinh xảo và hoa tươi nghệ thuật.">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="canonical" href="https://tiemnhagom.vn/cart/">
    <link rel="stylesheet" href="../css/style.css?v=14">
    <link rel="icon" type="image/png" href="../Asset/icons/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Tom Select cho dropdown tìm kiếm -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <style>
        .ts-control {
            padding: 0.7rem !important;
            border: 1px solid #ccc !important;
            border-radius: 4px !important;
            font-family: inherit !important;
            font-size: 0.9rem !important;
            box-shadow: none !important;
            background-color: #fff !important;
            color: #333 !important;
            min-height: 42px; /* Ensure same height as standard inputs */
            display: flex;
            align-items: center;
        }
        .ts-control.focus {
            border-color: #888 !important;
            box-shadow: none !important;
        }
        .ts-wrapper.single .ts-control:after {
            right: 15px !important;
        }
        .ts-dropdown {
            font-size: 0.9rem;
            font-family: inherit;
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4FNKRZ13JC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4FNKRZ13JC');
    </script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="cart-container">
        <div id="cart-content" class="checkout-layout" style="display: none;">
            <!-- Cột trái: Billing & Payment -->
            <div class="checkout-col-left" id="checkout-form-container">
                <!-- Rendered by JS -->
            </div>

            <!-- Cột phải: Order Summary -->
            <div class="checkout-col-right">
                <div class="order-summary-box">
                    <h3 class="summary-title">Order Summary | Tóm tắt đơn hàng</h3>
                    <div id="cart-items-summary">
                        <!-- Sản phẩm render ở đây -->
                    </div>
                    
                    <div class="coupon-section">
                        <input type="text" id="coupon-input" placeholder="Mã ưu đãi...">
                        <button onclick="applyCoupon()" class="btn-minimal">Áp dụng</button>
                    </div>

                    <!-- Container hiển thị danh sách voucher khả dụng -->
                    <div id="available-coupons-container" style="margin-top: 1rem; display: none; padding: 12px; background: #fff; border: 1px dashed #ced4da; border-radius: 8px;">
                        <h4 style="font-size: 0.8rem; text-transform: uppercase; font-family: var(--font-serif); letter-spacing: 0.5px; color: #2c3e50; margin: 0 0 8px 0; display: flex; align-items: center; gap: 4px;">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
                            Mã ưu đãi khả dụng
                        </h4>
                        <div id="coupons-list-render" style="display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; padding-right: 2px;">
                            <!-- Render bởi JS -->
                        </div>
                    </div>

                    <div id="price-breakdown" class="price-breakdown">
                        <!-- Chi tiết tiền render ở đây -->
                    </div>

                    <div class="terms-agreement">
                        <label class="checkbox-container">
                            <input type="checkbox" id="terms-agreement">
                            <span class="checkmark"></span>
                            Tôi đã đọc và đồng ý với <a href="../terms-of-service.html" target="_blank">Điều khoản dịch vụ</a> của website.
                        </label>
                    </div>

                    <button onclick="placeOrder()" class="btn-dark btn-place-order">Đặt hàng ngay</button>
                </div>
            </div>
        </div>
        
        <div id="empty-cart-msg" style="display: none; text-align: center; padding: 5rem;">
            <p style="margin-bottom: 2rem;">Giỏ hàng của bạn đang trống.</p>
            <a href="../" class="btn-dark">Quay lại mua sắm</a>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="../js/cart.js?v=2"></script>
</body>
</html>
