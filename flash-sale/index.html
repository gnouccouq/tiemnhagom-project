<body>
    <div id="header-placeholder"></div>

    <main>
        <section class="product-banner flash-sale-banner">
            <div class="banner-content">
                <h1 class="shimmer-title">Flash Sale</h1>
                <p>Nhanh tay sở hữu những món gốm độc bản với ưu đãi tốt nhất trong tuần này.</p>
                
                <div id="flash-sale-countdown" class="countdown-container" style="margin-bottom: 2rem;">
                    <div class="countdown-item"><span class="countdown-num" id="days">00</span><span class="countdown-label">Ngày</span></div>
                    <div class="countdown-item"><span class="countdown-num" id="hours">00</span><span class="countdown-label">Giờ</span></div>
                    <div class="countdown-item"><span class="countdown-num" id="minutes">00</span><span class="countdown-label">Phút</span></div>
                    <div class="countdown-item"><span class="countdown-num" id="seconds">00</span><span class="countdown-label">Giây</span></div>
                </div>

                <div class="sale-tag-hero">Ưu đãi lên đến 50%</div>
            </div>
        </section>

        <div class="products-page-container" style="padding-top: 0;">

        <div class="sort-options">
            <label for="sort-by">Sắp xếp theo:</label>
            <select id="sort-by">
                <option value="sale-desc">Giảm giá nhiều nhất</option>
                <option value="newest">Mới nhất</option>
                <option value="price-asc">Giá tăng dần</option>
                <option value="price-desc">Giá giảm dần</option>
                <option value="rating-desc">Đánh giá cao nhất</option>
            </select>
        </div>

        <div class="flash-sale-layout">
            <!-- Sidebar chọn nhanh mức giá -->
            <aside class="price-tabs-sidebar">
                <h4 class="variant-title" style="margin-bottom: 1.5rem; border-bottom: 1.5px solid #eee; padding-bottom: 10px;">Lọc theo giá</h4>
                <div id="price-tabs-container" class="price-tabs-container"></div>
            </aside>

            <!-- Container chứa các section chương trình Sale xếp dọc -->
            <div id="flash-sale-grid" class="flash-sale-sections-container">
                <!-- Sản phẩm Flash Sale sẽ được render tại đây -->
            </div>
        </div>

        <div id="no-flash-sale-products" style="text-align: center; padding: 5rem; display: none;">
            <p style="font-size: 1.2rem; color: #888;">Rất tiếc, hiện tại không có sản phẩm nào đang Flash Sale.</p>
            <p style="margin-top: 1rem;"><a href="../products/" class="btn-dark">Khám phá các sản phẩm khác</a></p>
        </div>

        <div class="pagination-container">
            <button id="prev-page" class="btn-minimal">&larr; Trang trước</button>
            <span id="page-info">Trang 1</span>
            <button id="next-page" class="btn-minimal">Trang sau &rarr;</button>
        </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script type="module" src="../js/flash-sale.js"></script>
