<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Nhà Gốm - Sắp ra mắt!</title>
    <meta name="description" content="Tiệm Nhà Gốm đang chuẩn bị ra mắt với nhiều sản phẩm gốm thủ công độc đáo. Hãy quay lại sớm để khám phá bộ sưu tập mới nhất!">
    <link rel="stylesheet" href="../css/style.css?v=14">
    <link rel="canonical" href="https://tiemnhagom.vn/maintenance/">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link rel="icon" type="image/png" href="../Asset/icons/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100dvh; /* Sử dụng min-height thay vì height cố định */
            overflow-x: hidden;
            padding: 0 !important; /* Xóa bỏ padding mặc định từ style.css?v=14 */
            margin: 0 !important;
        }
        main {
            flex: 1; /* Đảm bảo main chiếm hết không gian còn lại */
            display: flex;
            align-items: flex-start; /* Cho phép nội dung bắt đầu từ đỉnh nếu dài hơn màn hình */
            justify-content: center;
            padding: 0; /* Bỏ padding mặc định của main */
            width: 100%;
        }
        .countdown-hero {
            width: 100%;
            min-height: 100dvh;
            position: relative;
            margin-top: 0 !important; /* Ghi đè margin-top: 2rem từ style.css?v=14 */
            background: #000; /* Nền đen dự phòng */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
            padding: 3rem 5% !important; /* Tăng padding để tránh bị che bởi thanh công cụ trình duyệt */
        }
        .bg-video {
            position: fixed; /* Giữ video nền cố định khi cuộn */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* Lớp phủ gradient đè lên video */
        .countdown-hero::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4));
            z-index: 2;
        }
        /* Đẩy nội dung lên trên cùng */
        .countdown-hero > *:not(video) {
            position: relative;
            z-index: 3;
        }
        .coming-soon-label {
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
            font-weight: 400;
        }
        .countdown-hero h1 {
            font-family: var(--font-serif);
            font-size: 4.5rem; /* Tăng kích thước chữ */
            margin-bottom: 1.8rem; /* Tăng khoảng cách */
            color: #fff;
            border: none;
            letter-spacing: -1px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.4); /* Thêm đổ bóng cho chữ */
        }
        .countdown-hero p {
            font-size: 1.1rem;
            max-width: 800px; /* Tăng chiều rộng tối đa cho đoạn văn */
            opacity: 0.9;
            max-width: 700px;
            margin-bottom: 3rem;
            line-height: 1.8;
            font-weight: 300;
        }
        .countdown-timer {
            display: flex;
            gap: 30px;
            margin-bottom: 4rem; /* Tăng khoảng cách */
        }
        .countdown-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 15px;
            min-width: 140px; /* Tăng nhẹ chiều rộng */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .countdown-item:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.08);
        }
        .countdown-item span {
            display: block;
            font-size: 4rem; /* Tăng kích thước số */
            font-weight: 300;
            line-height: 1;
            margin-bottom: 0.5rem;
            font-family: var(--font-serif);
        }
        .countdown-item small {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .countdown-hero .btn-outline {
            border-radius: 30px;
            padding: 1.2rem 3.5rem; /* Tăng kích thước nút */
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }
        .social-links-maintenance {
            display: flex;
            gap: 20px;
            margin-top: 0rem;
        }
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }
        /* Class áp dụng hiệu ứng khi số thay đổi */
        .countdown-item span.number-change-animation {
            animation: numberPop 0.4s ease-out;
        }
        /* Keyframes cho hiệu ứng số nhảy */
        @keyframes numberPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        @media (max-width: 768px) {
            .countdown-hero { padding: 4rem 5% 2rem !important; justify-content: flex-start; } /* Đẩy nội dung lên trên một chút */
            .coming-soon-label { font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 1rem; }
            .countdown-hero h1 { font-size: 2.2rem; margin-bottom: 1.2rem; line-height: 1.2; }
            .countdown-hero p { font-size: 0.9rem; margin-bottom: 2rem; padding: 0 10px; }
            .countdown-timer { gap: 10px; margin-bottom: 2.5rem; }
            .countdown-item { min-width: 75px; padding: 1rem 0.3rem; border-radius: 10px; }
            .countdown-item span { font-size: 1.8rem; }
            .countdown-item small { font-size: 0.65rem; }
            .social-links-maintenance { margin-top: 1rem; padding-bottom: 2rem; } /* Thêm padding dưới cùng */
            body { overflow-y: auto; } /* Cho phép cuộn trên mobile nếu nội dung vẫn dài hơn màn hình */
        }
    </style>
</head>
<body>


    <main>
        <section class="countdown-hero">
            <video autoplay muted loop playsinline poster="../Asset/images/hero-bg.webp" class="bg-video">
                <source src="../Asset/videos/maintenance-bg.mp4" type="video/mp4">
                Trình duyệt của bạn không hỗ trợ video nền.
            </video>

            <div class="coming-soon-label" id="maintenance-label">SẮP RA MẮT</div>
            <h1 id="maintenance-h1">Tiệm Nhà Gốm Sắp Ra Mắt!</h1>
            <p id="maintenance-p">Chúng tôi đang gấp rút hoàn thiện những khâu cuối cùng để mang đến cho bạn một trải nghiệm mua sắm tuyệt vời nhất với các sản phẩm gốm thủ công độc đáo. Hãy cùng đếm ngược và chờ đón nhé!</p>
            
            <div class="countdown-timer">
                <div class="countdown-item"><span id="days">00</span><small>Ngày</small></div>
                <div class="countdown-item"><span id="hours">00</span><small>Giờ</small></div>
                <div class="countdown-item"><span id="minutes">00</span><small>Phút</small></div>
                <div class="countdown-item"><span id="seconds">00</span><small>Giây</small></div>
            </div>

            <p style="margin-top: -2rem; margin-bottom: 1rem; font-size: 1rem; opacity: 0.9;">Theo dõi chúng mình ở đây</p>
            <div class="social-links-maintenance">
                <a href="https://www.facebook.com/tiemnhagom.vn" target="_blank" class="social-btn" title="Facebook">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"></path></svg>
                </a>
                <a href="https://www.instagram.com/tiemnhagom.vn" target="_blank" class="social-btn" title="Instagram">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </a>
            </div>
        </section>
    </main>


    <script type="module" src="../js/maintenance.js"></script>
</body>
</html>
