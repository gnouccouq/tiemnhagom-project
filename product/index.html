<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - Tiệm Nhà Gốm</title>
    <meta name="description" content="Chi tiết sản phẩm gốm sứ thủ công nghệ thuật tại Tiệm Nhà Gốm. Nơi mang hơi thở của đất và lửa vào không gian sống của bạn.">
    <link rel="canonical" href="https://tiemnhagom.vn/product/">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../Asset/icons/favicon.png">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://tiemnhagom.vn/product/">
    <meta property="og:title" content="Sản phẩm | Tiệm Nhà Gốm">
    <meta property="og:description" content="Chi tiết sản phẩm gốm sứ thủ công nghệ thuật tại Tiệm Nhà Gốm. Nơi mang hơi thở của đất và lửa vào không gian sống của bạn.">
    <meta property="og:image" content="https://tiemnhagom.vn/Asset/images/hero-bg.jpg">
    <meta property="og:locale" content="vi_VN">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://tiemnhagom.vn/product/">
    <meta property="twitter:title" content="Sản phẩm | Tiệm Nhà Gốm">
    <meta property="twitter:description" content="Chi tiết sản phẩm gốm sứ thủ công nghệ thuật tại Tiệm Nhà Gốm. Nơi mang hơi thở của đất và lửa vào không gian sống của bạn.">
    <meta property="twitter:image" content="https://tiemnhagom.vn/Asset/images/hero-bg.jpg">

    <!-- Bảo mật: Ép trình duyệt nâng cấp các request HTTP lên HTTPS -->
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4FNKRZ13JC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4FNKRZ13JC');
    </script>

    <!-- Speculation Rules API -->
    <script type="speculationrules">
    {
      "prerender": [{
        "source": "document",
        "where": {
          "and": [
            { "href_matches": "/*" },
            { "not": { "href_matches": [
              "/admin/*",
              "/cart/*",
              "/login/*",
              "/profile/*"
            ]}}
          ]
        },
        "eagerness": "moderate"
      }]
    }
    </script>
</head>
<body>
    <div id="header-placeholder"></div>
    <div id="toast-container" class="toast-container"></div>

    <main class="product-detail-container" style="padding-top: 2.5rem;">
        <div class="back-navigation">
            <a href="javascript:history.back()" class="btn-back">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Quay lại
            </a>
        </div>
        <div id="product-detail-content" class="product-detail-grid">
            <!-- Dữ liệu sẽ được render từ Firebase -->
            <p style="text-align: center; grid-column: 1/-1; padding: 5rem;">Đang tải thông tin sản phẩm...</p>
        </div>
    </main>

    <section id="recently-viewed-section" style="padding: 2rem 5%; max-width: 1600px; margin: 0 auto; display: none;">
        <h2 style="text-align: center; margin-bottom: 2rem; font-family: var(--font-serif);">Sản phẩm bạn đã xem</h2>
        <div id="recently-viewed-grid" class="grid">
            <!-- Sản phẩm đã xem sẽ render ở đây -->
        </div>
    </section>

    <section id="related-products-section" style="padding: 4rem 5%; max-width: 1600px; margin: 0 auto; display: none;">
        <h2 style="text-align: center; margin-bottom: 2rem; font-family: var(--font-serif);">Sản phẩm gợi ý khác</h2>
        <div id="related-product-grid" class="grid">
            <!-- Sản phẩm gợi ý sẽ được render ở đây -->
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script type="module" src="../js/product-detail.js"></script>
</body>
</html>
