    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; margin-top: 3rem; }
        .blog-card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.03); transition: 0.3s; }
        .blog-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .blog-img { width: 100%; height: 220px; object-fit: cover; }
        .blog-info { padding: 1.5rem; }
        .blog-date { font-size: 0.75rem; color: #888; text-transform: uppercase; margin-bottom: 0.5rem; display: block; }
        .blog-info h3 { font-family: var(--font-serif); font-size: 1.4rem; margin-bottom: 1rem; line-height: 1.3; }
        .blog-info p { color: #666; font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; }
    </style>

    <style>
        #col-hero {
            background-attachment: scroll;
            background-position: center;
            background-size: cover;
            width: 100%;
            height: 30vh;
            min-height: 300px;
            margin-top: -80px;
            margin-bottom: 4rem;
        }
    </style>
</head>
<body class="home-page">
    <div id="header-placeholder"></div>
    <main>
        <!-- Banner đầu trang full chiều ngang, phong cách tối giản -->
        <section id="col-hero" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1520408222757-6f9f95d87d5d?q=80&w=1600'); display: flex; align-items: center; justify-content: center; position: relative;">
            <h1 id="hero-banner-title" style="color: #fff; font-size: 1.4rem; font-weight: 600; letter-spacing: 1px; text-transform: lowercase; z-index: 10; text-align: center;">Tin tức & Chia sẻ</h1>
        </section>

        <div class="products-page-container" style="padding-top: 0;">
            <div id="blog-list" class="blog-grid">
                <!-- JS render -->
                <div style="text-align: center; grid-column: 1/-1;"><span class="spinner"></span></div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script type="module" src="../js/blog.js"></script>
</body>
</html>
